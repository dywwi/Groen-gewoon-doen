<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Groen & Gewoon Doen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="">
  <script src="js/admin.js"></script>
</head>
<body class="admin-body">

<div class="admin-page">

  <!-- Header -->
  <header class="admin-header">
    <div class="header-left">
      <button class="menu-button">☰</button>
      <h4 class="header-title">Admin - Groen & Gewoon Doen</h4>
    </div>

    <button class="logout-button">Logout</button>
  </header>
  <hr class="custom-divider">
  
<nav class="admin-nav">
  <button data-section="orders-section">Orders</button>
  <button data-section="packages-section">Pakketten</button>
  <button data-section="tarieven-section">Tarieven</button>
</nav>


  <!-- Content -->
  <main class="admin-content">

    <!-- Orders -->
    <section id="packages-section">
  <h2>Pakketten Beheren</h2>

  <table class="admin-table">
    <thead>
      <tr>
        <th>Naam</th>
        <th>Beschrijving</th>
        <th>Prijs</th>
        <th>Bewerk</th>
        <th>Verwijder</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <div class="form-box">
    <h3>Nieuw Pakket</h3>

    <label>
      Naam
      <input type="text" id="package-name">
    </label><br>

    <label>
      Beschrijving
      <input type="text" id="package-description">
    </label><br>

    <label>
      Prijs
      <input type="number" id="package-price">
    </label><br>

    <button onclick="addPackage()">Toevoegen</button>
  </div>
</section>

    <hr class="custom-divider">

    <section id="packages-section">
  <h2>Pakketten Beheren</h2>

  <table class="admin-table">
    <thead>
      <tr>
        <th>Naam</th>
        <th>Beschrijving</th>
        <th>Prijs</th>
        <th>Bewerk</th>
        <th>Verwijder</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <div class="form-box">
    <h3>Nieuw Pakket</h3>

    <label>
      Naam
      <input type="text" id="package-name">
    </label><br>

    <label>
      Beschrijving
      <input type="text" id="package-description">
    </label><br>

    <label>
      Prijs
      <input type="number" id="package-price">
    </label><br>

    <button onclick="addPackage()">Toevoegen</button>
  </div>
</section>

    <hr class="custom-divider">

    <!-- Tarieven Beheren -->
    <section id="tarieven-section">
      <h2>Tarieven Beheren <span class="optional"></span></h2>

      <div class="form-inline">
        <label>
          Prijs per m² Gras
          <input type="number">
        </label><br>

        <label>
          Prijs per m² Tegels
          <input type="number">
        </label><br>

        <button>Opslaan</button>
      </div>
    </section><br>

  </main>
<hr class="custom-divider">

<script>
async function loadPackages() {
  const response = await fetch('/packages');
  const packages = await response.json();

  const tbody = document.querySelector('#packages-section tbody');
  tbody.innerHTML = '';

  packages.forEach((pkg, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${pkg.name}</td>
      <td>${pkg.description}</td>
      <td>€${pkg.price}</td>
      <td><button onclick="editPackage(${index})">Bewerk</button></td>
      <td><button onclick="deletePackage(${index})">Verwijder</button></td>
    `;
    tbody.appendChild(row);
  });
}

async function addPackage() {
  const name = document.getElementById('package-name').value;
  const description = document.getElementById('package-description').value;
  const price = document.getElementById('package-price').value;

  if(!name || !description || !price) return alert('Vul alle velden in!');

  await fetch('/packages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, description, price })
  });

  document.getElementById('package-name').value = '';
  document.getElementById('package-description').value = '';
  document.getElementById('package-price').value = '';

  loadPackages();
}

async function deletePackage(id) {
  if(!confirm('Weet je zeker dat je dit pakket wilt verwijderen?')) return;
  await fetch('/packages/' + id, { method: 'DELETE' });
  loadPackages();
}

function editPackage(id) {
  alert("Bewerk functie niet volledig geïmplementeerd voor ID: " + id);
}

loadPackages();
</script>

  <!-- Footer -->
  <footer class="admin-footer">
    © Groen & Gewoon Doen - Admin Paneel
  </footer>

</div>

</body>
</html>
