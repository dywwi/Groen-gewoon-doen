<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Groen & Gewoon Doen</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="body">

  <!-- Header -->
  <header class="header">
    <div class="header-left"></div>
      <h4 class="header-title">Admin - Groen & Gewoon Doen</h4>
    </div>

 <button class="nav-button" onclick="goToIndex()">Naar Website</button>
  </header>
  <hr class="custom-divider">
  
<nav class="nav">
  <button data-section="orders-section">Orders</button>
  <button data-section="packages-section">Pakketten</button>
  <button data-section="tarieven-section">Tarieven</button>
</nav>


  <!-- Content -->
  <main class="content">

    <!-- Orders -->
    <section class="card" id="orders-section">
      <table class="table">
        <thead>
          <tr>
            <th></th>
            <th>Order ID</th>
            <th>Prijs</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>

      <div class="form-box">
  <h3>Nieuw Order</h3>

  <label>
    Klant
    <input type="text" id="klant">
  </label><br>

  <label>
    Details
    <input type="text" id="details">
  </label><br>

  <label>
    Offerte (€)
    <input type="number" id="offerte">
  </label><br>

  <label>
    Status
    <select id="status">
      <option value="nieuw">Nieuw</option>
      <option value="in behandeling">In behandeling</option>
      <option value="afgerond">Afgerond</option>
    </select>
  </label><br>

  <button onclick="handleCreateOrder()">Toevoegen</button>
</div>
    </section>
    <hr class="custom-divider">

  
    <section class="card" id="packages-section">
  <h2>Pakketten Beheren</h2>

  <table class="table">
    <thead>
      <tr>
        <th>Naam</th>
        <th>Beschrijving</th>
        <th>Prijs</th>
        <th>Bewerk</th>
        <th>Verwijder</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <div class="form-box">
    <h3>Nieuw Pakket</h3>

    <label>
      Naam
      <input type="text" id="package-name">
    </label><br>

    <label>
      Beschrijving
      <input type="text" id="package-description">
    </label><br>

    <label>
      Prijs
      <input type="number" id="package-price">
    </label><br>

    <button onclick="addPackage()">Toevoegen</button>
  </div>
</section>

    <hr class="custom-divider">

    <!-- Tarieven Beheren -->
    <section class="card" id="tarieven-section">
      <h2>Tarieven Beheren <span class="optional"></span></h2>

      <div class="form-inline">
        <label>
          Prijs per m² Gras
          <input type="number" id="prijs-gras">
        </label><br>

        <label>
          Prijs per m² Tegels
          <input type="number" id="prijs-tegels">
        </label><br>

        <button onclick="saveTarieven()">Opslaan</button>
      </div>
    </section><br>
</main>

<hr class="custom-divider">

  <!-- Footer -->
  <footer class="footer">
    © Groen & Gewoon Doen - Admin Paneel
  </footer>

  <script src="js/admin.js"></script>
</body>
</html>
